                try {
                    $roleModel = new Role();
                    $roles = $roleModel->getAllRoles();
                    foreach ($roles as $role) {
                        $roleId = $role->role_id ?? $role->id;
                        echo "<option value='{$roleId}'>" . ucfirst($role->role_name ?? $role->name) . "</option>";

    <div id="result"></div>
    
    <script>
    $('#testAddUserForm').submit(function(e) {
        e.preventDefault();
        
        console.log('Form submission started');
        console.log('Form data:', $(this).serialize());
        
        $('#result').html('Submitting...');
        
        $.ajax({
            url: '/admin/addUser',
            method: 'POST',
            data: $(this).serialize(),
            dataType: 'json',
            success: function(response) {
                console.log('Success response:', response);
                if (response.success) {
                    $('#result').html('<p style="color: green;">✓ User created successfully!</p>');
                } else {
                    $('#result').html('<p style="color: red;">✗ Error: ' + response.message + '</p>');
                }
            },
            error: function(xhr, status, error) {
                console.log('Error response:', xhr.responseText);
                console.log('Status:', status);
                console.log('Error:', error);
                $('#result').html('<p style="color: red;">✗ AJAX Error: ' + error + '</p><p>Response: ' + xhr.responseText + '</p>');
            }
        });
    });
    </script>
</body>
